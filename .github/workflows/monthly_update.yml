name: Aggiornamento mensile dati fondi

on:
  # Ogni 5 del mese alle 02:00 UTC (= 04:00 ora italiana)
  schedule:
    - cron: "0 2 5 * *"
  # Permette esecuzione manuale dal tab Actions su GitHub
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # max ~5h50m (GitHub free: 6h)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 pandas openpyxl

      - name: Aggiorna performance da fondidoc
        run: python .github/scripts/update_performance.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit e push dati aggiornati
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fondi.xlsx data/fondidoc_cache.json
          git diff --staged --quiet || git commit -m "Auto: aggiornamento dati $(date +'%Y-%m-%d')"
          git push
